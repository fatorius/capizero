# Gauntlet opponents — sourced by run_gauntlet.sh as bash.
#
# Each entry is a COMPLETE set of fastchess `-engine` arguments. One logical
# opponent per block. Add/remove/tweak freely.
#
# Stockfish's UCI_LimitStrength + UCI_Elo (1320..3190) caps its search to
# approximately the requested Elo. The mapping is not perfectly calibrated —
# treat the numbers as approximate anchors, not precise ratings (see
# README.md "Caveats").
#
# Paths are resolved relative to the repo root (run_gauntlet.sh cds there).

OPPONENTS=(
    # --- Stockfish at reduced strength, coarse ladder ---
    -engine cmd=./stockfish name=sf1320 proto=uci option.UCI_LimitStrength=true option.UCI_Elo=1320
    -engine cmd=./stockfish name=sf1500 proto=uci option.UCI_LimitStrength=true option.UCI_Elo=1500
    -engine cmd=./stockfish name=sf1700 proto=uci option.UCI_LimitStrength=true option.UCI_Elo=1700
    -engine cmd=./stockfish name=sf1900 proto=uci option.UCI_LimitStrength=true option.UCI_Elo=1900
    -engine cmd=./stockfish name=sf2100 proto=uci option.UCI_LimitStrength=true option.UCI_Elo=2100

    # --- Add other engines here, e.g.: ---
    # -engine cmd=/path/to/otherengine name=other proto=uci
)
